<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEMINAR BINGO</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --card: #1a1a1a;
      --border: #2e2e2e;
      --accent: #f5c842;
      --free: #f5c842;
      --text: #f0ede6;
      --muted: #888;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      gap: 28px;
    }

    header { text-align: center; }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.5rem, 16vw, 7rem);
      letter-spacing: 0.12em;
      color: var(--accent);
      line-height: 1;
      text-shadow: 4px 4px 0 #8a6e00;
    }

    .subtitle {
      font-size: 0.78rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 4px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 100%;
      max-width: 420px;
    }

    .cell {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 10px;
      font-size: clamp(0.65rem, 3.2vw, 0.85rem);
      font-weight: 600;
      line-height: 1.3;
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      word-break: break-word;
      hyphens: auto;
    }

    .cell:active { transform: scale(0.96); }

    .cell.marked {
      background: #1e1a00;
      border-color: var(--accent);
      color: var(--accent);
    }

    .cell.free {
      background: var(--accent);
      border-color: var(--accent);
      color: #0f0f0f;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1rem, 5vw, 1.4rem);
      letter-spacing: 0.08em;
      cursor: default;
    }

    .cell.free:active { transform: none; }

    .cell.pop { animation: pop 0.25s ease; }

    @keyframes pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.06); }
      100% { transform: scale(1); }
    }

    .shuffle-btn {
      background: var(--accent);
      color: #0f0f0f;
      border: none;
      border-radius: 100px;
      padding: 14px 40px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 0.14em;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s;
      box-shadow: 0 4px 0 #8a6e00;
      -webkit-tap-highlight-color: transparent;
    }

    .shuffle-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #8a6e00;
    }

    footer {
      font-size: 0.7rem;
      color: #444;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

  <header>
    <h1>SEMINAR BINGO</h1>
    <p class="subtitle">Tap a square to mark it</p>
  </header>

  <div class="board" id="board"></div>

  <button class="shuffle-btn" id="shuffleBtn"> Reshuffle</button>

  <script>
    const ITEMS = [
      "Abman: 'How should we think about this'",
      "Liang: 'Do you have a sense of'",
      "<em>Spanish murmurs in the crowd</em>",
      "Foad/Shoshana falls asleep",
      "Clark: 'This might be dumb'",
      "Kyu: Loudly opens/eats a bag of chips",
      "Sabia: Opens a second soda can",
      "Kangoh: Glares at woman",
    ];

    const board = document.getElementById('board');
    const shuffleBtn = document.getElementById('shuffleBtn');

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function checkWin() {
      const cells = [...document.querySelectorAll('.cell')];
      const marked = cells.map(c => c.classList.contains('marked') || c.classList.contains('free'));

      const lines = [
        [0,1,2], [3,4,5], [6,7,8],
        [0,3,6], [1,4,7], [2,5,8],
        [0,4,8], [2,4,6]
      ];

      const won = lines.some(line => line.every(i => marked[i]));

      if (won) {
        confetti({ particleCount: 180, spread: 80, origin: { y: 0.5 } });
      }
    }

    function buildBoard() {
      board.innerHTML = '';
      const picked = shuffle(ITEMS).slice(0, 8);

      for (let i = 0; i < 9; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';

        if (i === 4) {
          cell.classList.add('free');
          cell.textContent = 'Sabia opens 1 soda can';
        } else {
          const idx = i < 4 ? i : i - 1;
          cell.innerHTML = picked[idx];
          cell.addEventListener('click', () => {
            cell.classList.toggle('marked');
            cell.classList.add('pop');
            cell.addEventListener('animationend', () => cell.classList.remove('pop'), { once: true });
            checkWin();
          });
        }

        board.appendChild(cell);
      }
    }

    shuffleBtn.addEventListener('click', buildBoard);
    buildBoard();
  </script>

</body>
</html>
